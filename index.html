
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SuperSonic</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
    }

    textarea {
      width: 90%;
      height: 120px;
      border-radius: 16px;
      border: none;
      padding: 16px;
      font-size: 22px;
    }

    button {
      margin-top: 20px;
      padding: 16px 24px;
      font-size: 20px;
      border-radius: 16px;
      border: none;
      background: black;
      color: white;
    }

    #syllables {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .syllable {
      padding: 18px 24px;
      border-radius: 18px;
      background: #dddddd;
      font-size: 42px;
      font-weight: bold;
    }

    .active {
      background: yellow;
    }
  </style>
</head>

<body>

  <h1>SuperSonic</h1>

  <p>Inserisci una parola</p>

  <textarea id="inputText">TAVOLO</textarea>

  <br>

  <button onclick="processText()">Dividi in sillabe</button>

  <div id="syllables"></div>

  <script src="app.js"></script>

</body>
</html>
